<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Defect Dashboard — Active Sprints</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1e2230; --line:#2a2f3e; --text:#e6e8ee;
    --muted:#9aa3b2; --accent:#5b8cff; --shadow:0 6px 24px rgba(0,0,0,.35);
    --crit:#ff5c6c; --major:#ff9f43; --moderate:#feca57; --minor:#54a0ff; --unknown:#8395a7;
    --todo:#8395a7; --inprogress:#5b8cff; --done:#1dd1a1;
    --new:#1dd1a1; --closed:#576574; --changed:#feca57;
  }
  *{box-sizing:border-box}
  html{color-scheme:dark}
  @media print{
    html,body{background:var(--bg) !important}
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important }
    .drawer,.drawer-bg{display:none !important}
    .wrap{max-width:none;padding:0}
    .card{break-inside:avoid;box-shadow:none}
    .stake,.chgcol,table.defects tbody tr{break-inside:avoid}
    .filters{display:none !important}
  }
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:24px}
  h1{font-size:22px;margin:0 0 2px} h2{font-size:16px;margin:0 0 12px}
  .sub{color:var(--muted);font-size:13px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .grow{flex:1 1 320px}
  header.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .sprints{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--panel2)}
  .risk-ok{color:var(--done)} .risk-warn{color:var(--moderate)} .risk-bad{color:var(--crit)}
  table.matrix{width:100%;border-collapse:collapse;font-size:13px}
  table.matrix th,table.matrix td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--line)}
  table.matrix th:first-child,table.matrix td:first-child{text-align:left}
  table.matrix tbody td.cell{cursor:pointer;border-radius:8px}
  table.matrix tbody td.cell:hover{background:var(--panel2)}
  td.count0{color:var(--muted)}
  .sevdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .sev-Critical{background:var(--crit)} .sev-Major{background:var(--major)} .sev-Moderate{background:var(--moderate)} .sev-Minor{background:var(--minor)} .sev-Unknown{background:var(--unknown)}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .pill.sev-Critical{background:rgba(255,92,108,.16);color:var(--crit)} .pill.sev-Major{background:rgba(255,159,67,.16);color:var(--major)}
  .pill.sev-Moderate{background:rgba(254,202,87,.18);color:#b8860b} .pill.sev-Minor{background:rgba(84,160,255,.16);color:var(--minor)} .pill.sev-Unknown{background:rgba(131,149,167,.18);color:var(--unknown)}
  .st{font-weight:600} .st-todo{color:var(--todo)} .st-inprogress{color:var(--inprogress)} .st-done{color:var(--done)}
  .filters{display:flex;flex-direction:column;gap:10px;margin:6px 0 14px}
  .facet{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .facet-label{min-width:62px;color:var(--muted);font-size:12px;font-weight:600;padding-top:6px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .chip{display:inline-flex;align-items:center;gap:0;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:12px;cursor:pointer;user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.active .sevdot{box-shadow:0 0 0 2px rgba(255,255,255,.6)}
  input[type=search]{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;min-width:220px;flex:1 1 220px}
  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  table.defects{width:100%;border-collapse:collapse}
  table.defects th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  table.defects td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.defects tbody tr{cursor:pointer} table.defects tbody tr:hover{background:var(--panel2)}
  td.key a{color:var(--accent);text-decoration:none;font-weight:600} td.key a:hover{text-decoration:underline}
  .chg{font-size:10px;font-weight:800;text-transform:uppercase;padding:1px 6px;border-radius:6px;margin-left:6px}
  .chg-new{background:rgba(29,209,161,.18);color:var(--new)} .chg-closed{background:rgba(87,101,116,.25);color:var(--closed)} .chg-statusChanged{background:rgba(254,202,87,.2);color:#b8860b}
  .muted{color:var(--muted)} .nowrap{white-space:nowrap}
  .empty{color:var(--muted);padding:18px;text-align:center}
  .changes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .chgcol h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 8px}
  .chgcol ul{list-style:none;margin:0;padding:0} .chgcol li{padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .note{padding:12px 14px;border-radius:10px;background:var(--panel2);border:1px dashed var(--line);color:var(--muted)}
  /* drawer */
  .drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,92vw);background:var(--panel);border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(100%);transition:transform .22s ease;overflow:auto;padding:22px}
  .drawer.open{transform:translateX(0)} .drawer-bg.open{display:block}
  .drawer h2{margin-bottom:4px} .drawer .meta{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;margin:14px 0;font-size:13px}
  .drawer .meta dt{color:var(--muted)} .drawer .desc{white-space:pre-wrap;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px;margin-top:8px}
  .x{float:right;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;border:none;background:none}
  /* comms */
  .comms-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
  .stake{display:flex;flex-direction:column}
  .stake .head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .stake .role{font-weight:700} .stake .who{font-size:12px;color:var(--muted)}
  .stake .body{white-space:pre-wrap;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px;flex:1;min-height:120px}
  .stake .copy{margin-top:10px;align-self:flex-start}
  .ctxbox{font-size:12px;color:var(--muted);margin-top:10px}
  footer{color:var(--muted);font-size:12px;margin-top:24px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Defect Dashboard — Active Sprints</h1>
      <div class="sub" id="meta-line"></div>
      <div class="sprints" id="sprint-badges"></div>
    </div>
    <div class="badge" id="totals"></div>
  </header>

  <div class="row" style="margin-bottom:16px">
    <section class="card grow">
      <h2>Severity × Status</h2>
      <table class="matrix" id="matrix"></table>
    </section>
    <section class="card grow">
      <h2>Changes since last update</h2>
      <div id="changes"></div>
    </section>
  </div>

  <section class="card" style="margin-bottom:16px">
    <h2>Defects</h2>
    <div class="filters">
      <div class="facet"><span class="facet-label">Sprint</span><div class="chips" id="chips-sprint"></div></div>
      <div class="facet"><span class="facet-label">Severity</span><div class="chips" id="chips-sev"></div></div>
      <div class="facet"><span class="facet-label">Status</span><div class="chips" id="chips-status"></div></div>
      <div class="facet">
        <input type="search" id="f-q" placeholder="Search key, summary, description…" />
        <button class="btn" id="f-clear">Clear</button>
        <span class="muted" id="f-count" style="padding-top:6px"></span>
      </div>
    </div>
    <table class="defects" id="defects"></table>
  </section>

  <section class="card" id="comms-section" style="display:none">
    <h2>Stakeholder communications</h2>
    <div class="sub" id="comms-sub"></div>
    <div class="comms-grid" id="comms-grid" style="margin-top:14px"></div>
    <div class="ctxbox" id="comms-ctx"></div>
  </section>

  <footer id="foot"></footer>
</div>

<div class="drawer-bg" id="drawer-bg"></div>
<aside class="drawer" id="drawer"></aside>

o follow how existing SG behaves.\n\n**Actual Result**\nUsers are able to enter special characters and emojis in the Applicant Name field without any validation error.\n\n---\n\n_Imported from UAT Defect list V1.0 (25June2026)_\n\n* Source Key: GEMPOS-345\n* Assignee (source): Muhammad Izzuddin Bin Mohd Hazidi\n* Status (source): Closed\n* Defect Classification: (APPLICATION) Data Mapping\n* Component/s: FO-Migration\n* Fix Version: 1.0.2\n* Sprint: RN-P1-Sprint04.2026\n* Date Created: 6/8/2026 22:39\n* Remarks: -\n\n","severity":"Minor","priority":"Low","status":"Released","statusCategory":"Done","sprint":"Sprint 4","sprintEndDate":"2026-06-30T10:30:00.000Z","created":"2026-06-28T03:13:39.284+0800","updated":"2026-06-28T03:16:02.932+0800"},{"key":"SCRUM-72","sourceKey":"GEMPOS-344","url":"https://vidhyaunni6.atlassian.net/browse/SCRUM-72","summary":"GSMR-25 - Profile Top Screen - the Page able to move left and right. By right, it should be static one.","description":"**Description**\nOn the Profile Top Screen, the page can be moved or scrolled left and right. The screen should remain fixed horizontally and only allow vertical scrolling where applicable.\n\n**Step to simulate:**\n\n# Go to FSB Profile Screen\n\n# Try to slide left and right.\n\n**Expected Result**\nThe profile top page should be static one.\n\n**Actual Result**\nUsers are able to scroll or move the page horizontally, causing unintended screen movement.\n\n---\n\n_Imported from UAT Defect list V1.0 (25June2026)_\n\n* Source Key: GEMPOS-344\n* Assignee (source): Muhammad Izzuddin Bin Mohd Hazidi\n* Status (source): Closed\n* Defect Classification: (APPLICATION) Cosmetic Defect\n* Component/s: FO-Migration\n* Fix Version: 1.0.2\n* Sprint: RN-P1-Sprint04.2026\n* Date Created: 6/8/2026 22:22\n* Remarks: -\n\n","severity":"Minor","priority":"Low","status":"Released","statusCategory":"Done","sprint":"Sprint 4","sprintEndDate":"2026-06-30T10:30:00.000Z","created":"2026-06-28T03:13:33.650+0800","updated":"20 (function(){
  var D = window.__DASHBOARD__ || {meta:{},activeSprints:[],defects:[],diff:{}};
  var C = window.__COMMS__ || null;
  var defects = D.defects || [];
  var diff = D.diff || {};
  var SEV_ORDER = ["Critical","Major","Moderate","Minor","Unknown"];
  var CAT_ORDER = ["To Do","In Progress","Done"];
  var esc = function(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c];});};
  var byKey = {}; defects.forEach(function(d){byKey[d.key]=d;});
  var changeIndex = diff.changeIndex || {};

  // ---- header ----
  var m = D.meta||{};
  document.getElementById('meta-line').textContent =
    (m.site? m.site+" • ":"") + "Last refreshed " + fmt(m.generatedAt);
  document.getElementById('totals').textContent = defects.length + " defects in active sprints";
  var sb = document.getElementById('sprint-badges');
  (D.activeSprints||[]).forEach(function(s){
    var risk = sprintRisk(s.name);
    var el = document.createElement('span'); el.className='badge';
    el.innerHTML = esc(s.name) + (s.endDate? ' <span class="muted">· ends '+fmt(s.endDate)+'</span>':'')
      + ' <span class="'+risk.cls+'">'+risk.label+'</span>';
    sb.appendChild(el);
  });

  // ---- matrix ----
  (function(){
    var cats = CAT_ORDER.slice();
    var present = {}; defects.forEach(function(d){present[d.statusCategory]=1;});
    Object.keys(present).forEach(function(c){if(cats.indexOf(c)<0)cats.push(c);});
    var counts = {}; SEV_ORDER.forEach(function(s){counts[s]={};cats.forEach(function(c){counts[s][c]=0;});counts[s]._t=0;});
    var colT = {}; cats.forEach(function(c){colT[c]=0;}); var grand=0;
    defects.forEach(function(d){
      var s = counts[d.severity]?d.severity:"Unknown";
      var c = counts[s][d.statusCategory]!=null?d.statusCategory:cats[0];
      counts[s][c]++; counts[s]._t++; colT[c]++; grand++;
    });
    var h='<thead><tr><th>Severity</th>';
    cats.forEach(function(c){h+='<th>'+esc(c)+'</th>';}); h+='<th>Total</th></tr></thead><tbody>';
    SEV_ORDER.forEach(function(s){
      if(counts[s]._t===0 && s==="Unknown") return;
      h+='<tr><td><span class="sevdot sev-'+s+'"></span>'+s+'</td>';
      cats.forEach(function(c){
        var n=counts[s][c];
        h+='<td class="cell '+(n?'':'count0')+'" data-sev="'+s+'" data-cat="'+esc(c)+'">'+n+'</td>';
      });
      h+='<td class="cell" data-sev="'+s+'" data-cat="">'+counts[s]._t+'</td></tr>';
    });
    h+='<tr><td class="muted">Total</td>';
    cats.forEach(function(c){h+='<td class="muted">'+colT[c]+'</td>';});
    h+='<td class="muted"><b>'+grand+'</b></td></tr></tbody>';
    var t=document.getElementById('matrix'); t.innerHTML=h;
    t.querySelectorAll('td.cell').forEach(function(td){
      td.addEventListener('click',function(){
        setFacet('chips-sev', [td.getAttribute('data-sev')]);
        var cat=td.getAttribute('data-cat');
        setFacet('chips-status', cat ? uniq(defects.filter(function(d){return d.statusCategory===cat;}).map(function(d){return d.status;})) : []);
        render();
      });
    });
  })();

  // ---- changes panel ----
  (function(){
    var box=document.getElementById('changes');
    if(!diff.hasPrevSnapshot){
      box.innerHTML='<div class="note">Baseline established from this refresh. Stakeholder communications will be generated on the next refresh once changes are detected.</div>';
      return;
    }
    if(!diff.hasChanges){
      box.innerHTML='<div class="note">No changes detected since the baseline yet — new, closed, or status-changed defects will appear here once Jira updates.</div>';
      return;
    }
    var cols=[
      ['New','new', diff.new||[]],
      ['Closed','closed', diff.closed||[]],
      ['Status changed','statusChanged', diff.statusChanged||[]],
      ['No longer in active sprint','removed', diff.removed||[]]
    ];
    var h='<div class="changes-grid">';
    cols.forEach(function(col){
      var rows=col[2]; if(!rows.length) return;
      h+='<div class="chgcol"><h3>'+col[0]+' ('+rows.length+')</h3><ul>';
      rows.forEach(function(r){
        var transition = (r.from||r.to)? ' <span class="muted">'+esc(r.from||'?')+' → '+esc(r.to||'?')+'</span>':'';
        h+='<li><span class="pill sev-'+(r.severity||'Unknown')+'">'+(r.severity||'?')+'</span> '
          +'<a href="#" data-jump="'+esc(r.key)+'" style="color:var(--accent);text-decoration:none">'+esc(r.key)+'</a>'
          +transition+'<div class="muted" style="font-size:12px">'+esc(trunc(r.summary,90))+'</div></li>';
      });
      h+='</ul></div>';
    });
    h+='</div>'; box.innerHTML=h;
    box.querySelectorAll('[data-jump]').forEach(function(a){
      a.addEventListener('click',function(e){e.preventDefault();openDrawer(a.getAttribute('data-jump'));});
    });
  })();

  // ---- filters (multi-select chips) ----
  buildChips('chips-sprint', uniq(defects.map(function(d){return d.sprint;})).map(function(s){return {val:s,label:s};}));
  buildChips('chips-sev', SEV_ORDER.filter(function(s){return defects.some(function(d){return d.severity===s;});}).map(function(s){return {val:s,label:s,dot:s};}));
  buildChips('chips-status', sortByCat(uniq(defects.map(function(d){return d.status;}))).map(function(s){return {val:s,label:s};}));
  // default filters: Critical+Major severity, Open+In Progress status (only activates values present as chips)
  setFacet('chips-sev', ['Critical','Major']);
  setFacet('chips-status', ['Open','In Progress']);
  document.getElementById('f-q').addEventListener('input',render);
  document.getElementById('f-clear').addEventListener('click',function(){
    document.querySelectorAll('.chips .chip.active').forEach(function(b){b.classList.remove('active');});
    document.getElementById('f-q').value=''; render();
  });

  function render(){
    var sp=selected('chips-sprint'), sv=selected('chips-sev'), st=selected('chips-status'), q=val('f-q').toLowerCase();
    var rows=defects.filter(function(d){
      if(sp.length && sp.indexOf(d.sprint)<0) return false;
      if(sv.length && sv.indexOf(d.severity)<0) return false;
      if(st.length && st.indexOf(d.status)<0) return false;
      if(q){ var hay=(d.key+' '+d.sourceKey+' '+d.summary+' '+d.description).toLowerCase(); if(hay.indexOf(q)<0) return false; }
      return true;
    });
    rows.sort(function(a,b){ return SEV_ORDER.indexOf(a.severity)-SEV_ORDER.indexOf(b.severity) || (a.key<b.key?-1:1); });
    var h='<thead><tr><th>Key</th><th>Severity</th><th>Status</th><th>Sprint</th><th>Updated</th><th>Summary</th></tr></thead><tbody>';
    if(!rows.length){ h+='<tr><td colspan="6"><div class="empty">No defects match the current filters.</div></td></tr>'; }
    rows.forEach(function(d){
      var chg=changeIndex[d.key];
      h+='<tr data-key="'+esc(d.key)+'">'
        +'<td class="key nowrap"><a href="'+esc(d.url||'#')+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+esc(d.key)+'</a>'
        +(chg?'<span class="chg chg-'+chg+'">'+(chg==='statusChanged'?'changed':chg)+'</span>':'')+'</td>'
        +'<td><span class="pill sev-'+esc(d.severity)+'">'+esc(d.severity)+'</span></td>'
        +'<td class="nowrap st '+stCls(d.statusCategory)+'">'+esc(d.status)+'</td>'
        +'<td class="nowrap">'+esc(d.sprint||'—')+'</td>'
        +'<td class="nowrap muted">'+fmt(d.updated)+'</td>'
        +'<td>'+esc(trunc(d.summary,120))+'</td></tr>';
    });
    h+='</tbody>'; var t=document.getElementById('defects'); t.innerHTML=h;
    t.querySelectorAll('tbody tr[data-key]').forEach(function(tr){
      tr.addEventListener('click',function(){openDrawer(tr.getAttribute('data-key'));});
    });
    document.getElementById('f-count').textContent = rows.length+' of '+defects.length+' shown';
  }

  // ---- drawer ----
  var dbg=document.getElementById('drawer-bg'), dr=document.getElementById('drawer');
  dbg.addEventListener('click',closeDrawer);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
  function openDrawer(key){
    var d=byKey[key]; if(!d) return;
    var chg=changeIndex[key];
    dr.innerHTML='<button class="x" id="dx">×</button>'
      +'<h2>'+esc(d.summary)+'</h2>'
      +'<div class="sub"><a href="'+esc(d.url||'#')+'" target="_blank" rel="noopener" style="color:var(--accent)">'+esc(d.key)+'</a>'
        +(d.sourceKey?' · '+esc(d.sourceKey):'')+(chg?' · <span class="chg chg-'+chg+'">'+(chg==='statusChanged'?'changed':chg)+'</span>':'')+'</div>'
      +'<dl class="meta">'
        +'<dt>Severity</dt><dd><span class="pill sev-'+esc(d.severity)+'">'+esc(d.severity)+'</span> <span class="muted">(priority '+esc(d.priority||'—')+')</span></dd>'
        +'<dt>Status</dt><dd class="st '+stCls(d.statusCategory)+'">'+esc(d.status)+' <span class="muted">('+esc(d.statusCategory)+')</span></dd>'
        +'<dt>Sprint</dt><dd>'+esc(d.sprint||'—')+(d.sprintEndDate?' <span class="muted">· ends '+fmt(d.sprintEndDate)+'</span>':'')+'</dd>'
        +'<dt>Created</dt><dd>'+fmt(d.created)+'</dd><dt>Updated</dt><dd>'+fmt(d.updated)+'</dd>'
      +'</dl>'
      +'<h3 style="margin:6px 0 0;font-size:13px;color:var(--muted)">Description</h3>'
      +'<div class="desc">'+esc(d.description||'(no description)')+'</div>';
    document.getElementById('dx').addEventListener('click',closeDrawer);
    dbg.classList.add('open'); dr.classList.add('open');
  }
  function closeDrawer(){dbg.classList.remove('open');dr.classList.remove('open');}

  // ---- comms ----
  if(C && C.stakeholders && C.stakeholders.length){
    document.getElementById('comms-section').style.display='';
    document.getElementById('comms-sub').textContent='Latest stakeholder update — drafted '+fmt(C.generatedAt)+(diff.hasChanges?' from the changes above':'')+'. Persists across refreshes until new changes are detected. Copy to share.';
    var g=document.getElementById('comms-grid');
    C.stakeholders.forEach(function(s,i){
      var card=document.createElement('div'); card.className='card stake';
      card.innerHTML='<div class="head">'+avatar(s.initials,s.color)+'<div><div class="role">'+esc(s.role)+'</div><div class="who">'+esc(s.initials||'')+'</div></div></div>'
        +'<div class="body" id="cbody-'+i+'">'+esc(s.content)+'</div>'
        +'<button class="btn copy" data-i="'+i+'">Copy</button>';
      g.appendChild(card);
    });
    g.querySelectorAll('.copy').forEach(function(b){
      b.addEventListener('click',function(){
        var txt=C.stakeholders[+b.getAttribute('data-i')].content||'';
        copy(txt,b);
      });
    });
    if(C.context){
      var cx=document.getElementById('comms-ctx');
      cx.innerHTML='<b>Inputs used</b> — Mitigation/recovery: '+esc(C.context.mitigation||'—')+' · Decisions/asks: '+esc(C.context.decisions||'—');
    }
  }

  document.getElementById('foot').textContent='Generated by /dashboard-comms · self-contained, no network required.';
  render();

  // ---- helpers ----
  function avatar(init,color){
    color=color||'#5b8cff'; init=(init||'?').slice(0,3);
    return '<svg width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">'
      +'<circle cx="20" cy="20" r="20" fill="'+esc(color)+'"></circle>'
      +'<text x="20" y="20" dy=".35em" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="-apple-system,Segoe UI,Roboto,sans-serif">'+esc(init)+'</text></svg>';
  }
  function copy(txt,btn){
    var done=function(){var o=btn.textContent;btn.textContent='Copied!';setTimeout(function(){btn.textContent=o;},1400);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,function(){fallback(txt,done);});}
    else fallback(txt,done);
  }
  function fallback(txt,done){var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){}document.body.removeChild(ta);}
  function sprintRisk(name){
    var s=(D.activeSprints||[]).filter(function(x){return x.name===name;})[0];
    var open=defects.filter(function(d){return d.sprint===name && (d.severity==='Critical'||d.severity==='Major') && d.statusCategory!=='Done';});
    var end=s&&s.endDate?new Date(s.endDate):null; var now=new Date();
    if(open.length===0) return {cls:'risk-ok',label:'on track'};
    if(end && end.getTime()-now.getTime() < 3*864e5) return {cls:'risk-bad',label:'at risk ('+open.length+' crit/major open)'};
    return {cls:'risk-warn',label:open.length+' crit/major open'};
  }
  function stCls(cat){return 'st-'+String(cat||'').toLowerCase().replace(/[^a-z]/g,'');}
  function uniq(a){var o=[],seen={};a.forEach(function(x){if(x&&!seen[x]){seen[x]=1;o.push(x);}});return o.sort();}
  function sortByCat(statuses){ // order statuses by their statusCategory (To Do, In Progress, Done)
    var cat={}; defects.forEach(function(d){cat[d.status]=d.statusCategory;});
    return statuses.slice().sort(function(a,b){return (CAT_ORDER.indexOf(cat[a])-CAT_ORDER.indexOf(cat[b])) || (a<b?-1:1);});
  }
  function buildChips(containerId, items){
    var c=document.getElementById(containerId); c.innerHTML='';
    items.forEach(function(it){
      var b=document.createElement('button'); b.type='button'; b.className='chip'; b.setAttribute('data-val',it.val);
      b.innerHTML=(it.dot?'<span class="sevdot sev-'+it.dot+'"></span>':'')+esc(it.label);
      b.addEventListener('click',function(){b.classList.toggle('active');render();});
      c.appendChild(b);
    });
  }
  function selected(containerId){return [].map.call(document.querySelectorAll('#'+containerId+' .chip.active'),function(b){return b.getAttribute('data-val');});}
  function setFacet(containerId, vals){var set={};vals.forEach(function(v){set[v]=1;});document.querySelectorAll('#'+containerId+' .chip').forEach(function(b){b.classList.toggle('active',!!set[b.getAttribute('data-val')]);});}
  function val(id){return document.getElementById(id).value;}
  function trunc(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}
  function fmt(iso){if(!iso)return '—';var d=new Date(iso);if(isNaN(d))return esc(iso);return d.toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
})();
